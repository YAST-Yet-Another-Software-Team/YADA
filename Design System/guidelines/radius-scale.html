<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="sm / md / lg / xl / full" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:20px;display:flex;gap:20px;align-items:center}
.box{width:80px;height:80px;background:var(--color-primary-subtle);border:1.5px solid var(--color-primary);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font:var(--text-mono-sm);color:var(--color-primary)}
</style></head><body>
<div class="box" style="border-radius:var(--radius-sm)">sm</div>
<div class="box" style="border-radius:var(--radius-md)">md</div>
<div class="box" style="border-radius:var(--radius-lg)">lg</div>
<div class="box" style="border-radius:var(--radius-xl)">xl</div>
<div class="box" style="border-radius:var(--radius-full)">full</div>
</body></html>
