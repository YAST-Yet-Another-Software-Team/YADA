<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>YADA — request & track</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>
  html, body { margin: 0; background: var(--neutral-200); }
  #phone-shell { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  #frame {
    width: 390px; height: 780px; background: var(--color-bg); border-radius: 36px;
    box-shadow: var(--shadow-lg); overflow: hidden; position: relative; border: 8px solid var(--neutral-900);
  }
</style>
</head>
<body>
<div id="phone-shell"><div id="frame"><div id="root" style="height:100%"></div></div></div>

<script type="text/babel">
const { AuthScreen, RequestScreen, MatchingScreen, TrackingScreen, HistoryScreen } = window.YADADesignSystem_f2972f;

function App() {
  const [screen, setScreen] = React.useState("auth");

  React.useEffect(() => {
    if (screen === "matching") {
      const t = setTimeout(() => setScreen("tracking"), 2200);
      return () => clearTimeout(t);
    }
  }, [screen]);

  if (screen === "auth") return <AuthScreen onLogin={() => setScreen("request")} />;
  if (screen === "request") return <RequestScreen onRequest={() => setScreen("matching")} />;
  if (screen === "matching") return <MatchingScreen onCancel={() => setScreen("request")} />;
  if (screen === "tracking") return <TrackingScreen onDelivered={() => setScreen("history")} onCancel={() => setScreen("request")} />;
  if (screen === "history") return <HistoryScreen onNew={() => setScreen("request")} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
