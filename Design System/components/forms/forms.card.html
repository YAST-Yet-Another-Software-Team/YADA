<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>body{margin:0;padding:20px;background:var(--color-bg)}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Radio, Switch } = window.YADADesignSystem_f2972f;
function Demo() {
  const [check, setCheck] = React.useState(true);
  const [radio, setRadio] = React.useState("bike");
  const [sw, setSw] = React.useState(true);
  return (
    <div style={{display:"flex", flexDirection:"column", gap:16, fontFamily:"var(--font-body)"}}>
      <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
        <Button variant="primary">Request courier</Button>
        <Button variant="secondary">Secondary</Button>
        <Button variant="outline">Outline</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="danger">Cancel</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div style={{display:"flex", gap:10, alignItems:"center"}}>
        <IconButton icon={<iconify-icon icon="lucide:map-pin" style={{width:18,height:18}}></iconify-icon>} ariaLabel="Locate" />
        <IconButton icon={<iconify-icon icon="lucide:x" style={{width:18,height:18}}></iconify-icon>} ariaLabel="Close" variant="solid" />
        <IconButton icon={<iconify-icon icon="lucide:phone" style={{width:18,height:18}}></iconify-icon>} ariaLabel="Call" variant="outline" />
      </div>
      <div style={{display:"flex", gap:16, maxWidth:480}}>
        <Input label="Pickup address" placeholder="123 Main St" />
        <Select label="Vehicle" options={[{value:"bike",label:"Bike"},{value:"car",label:"Car"}]} value="bike" onChange={()=>{}} />
      </div>
      <div style={{display:"flex", gap:20, alignItems:"center"}}>
        <Checkbox label="Leave at door" checked={check} onChange={()=>setCheck(!check)} />
        <Radio name="v" label="Bike" checked={radio==="bike"} onChange={()=>setRadio("bike")} />
        <Radio name="v" label="Car" checked={radio==="car"} onChange={()=>setRadio("car")} />
        <Switch checked={sw} onChange={setSw} ariaLabel="Notifications" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
