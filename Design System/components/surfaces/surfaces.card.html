<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>body{margin:0;padding:20px;background:var(--color-bg)}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Card, Avatar, Tabs, Dialog, StatusPill } = window.YADADesignSystem_f2972f;
function Demo() {
  const [tab, setTab] = React.useState("active");
  const [open, setOpen] = React.useState(true);
  return (
    <div style={{display:"flex", flexDirection:"column", gap:16, fontFamily:"var(--font-body)"}}>
      <div style={{display:"flex", gap:16}}>
        <Card>
          <div style={{display:"flex", gap:12, alignItems:"center"}}>
            <Avatar initials="KA" status="online" />
            <div>
              <div style={{font:"var(--text-label)"}}>Kwame Asante</div>
              <StatusPill status="en_route" />
            </div>
          </div>
        </Card>
        <div style={{width:260}}><Tabs tabs={[{value:"active",label:"Active"},{value:"history",label:"History"}]} active={tab} onChange={setTab} /></div>
      </div>
      <button onClick={()=>setOpen(true)} style={{alignSelf:"flex-start", font:"var(--text-label)", padding:"8px 14px", borderRadius:8, border:"1px solid var(--color-border)", background:"var(--color-surface)", cursor:"pointer"}}>Open dialog</button>
      <Dialog open={open} onClose={()=>setOpen(false)} title="Cancel request?">
        <p style={{font:"var(--text-body-sm)", color:"var(--color-text-secondary)", margin:"0 0 16px"}}>Your courier hasn't been assigned yet.</p>
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
